<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner - Offline</title>
<style>
:root{--bg:#0f1221;--card:#171a2e;--text:#e9ecf1;--accent:#7c8cff;--high:#ff5d73;--med:#ffb020;--low:#3ddc97}
.light{--bg:#f6f7fb;--card:#ffffff;--text:#1c2133}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial}
header{padding:12px 16px;background:var(--card);display:flex;justify-content:space-between;position:sticky;top:0}
.container{display:grid;grid-template-columns:240px 1fr;gap:16px;padding:16px}
.card{background:var(--card);padding:14px;border-radius:12px;margin-bottom:12px}
button{background:var(--accent);border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;margin:4px}
input,select{padding:8px;border-radius:8px;border:1px solid #333;background:var(--card);color:var(--text);margin:4px}
.task{display:flex;justify-content:space-between;align-items:center;padding:8px;margin:6px 0;background:#00000015;border-radius:8px}
.badge{font-size:12px;padding:2px 6px;border-radius:6px}.high{color:var(--high)}.med{color:var(--med)}.low{color:var(--low)}
.timer{font-size:36px;text-align:center;margin:10px 0}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.note{min-height:120px;border:1px dashed #555;padding:8px;border-radius:8px;background:#00010}
@media(max-width:900px){.container{grid-template-columns:1fr}.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h2>📚 Study Planner</h2>
  <div><button onclick="toggleTheme()">🌓</button><button onclick="exportData()">Export</button><button onclick="clearData()">Reset</button></div>
</header>

<div class="container">
  <aside class="card">
    <button onclick="show('dashboard')">Dashboard</button><br>
    <button onclick="show('tasks')">Tasks</button><br>
    <button onclick="show('timer')">Pomodoro</button><br>
    <button onclick="show('goals')">Goals</button><br>
    <button onclick="show('notes')">Notes</button><br>
    <button onclick="show('exams')">Exams</button><br>
    <button onclick="show('analytics')">Analytics</button>
  </aside>
  <main id="view"></main>
</div>

<script>
let data = JSON.parse(localStorage.getItem('studyPlanner')) || {
  tasks:[], notes:[], exams:[], sessions:[], goals:{daily:2}, xp:0, level:1
};

function save(){localStorage.setItem('studyPlanner', JSON.stringify(data))}

function show(v){
  const el = document.getElementById('view');
  if(v==='dashboard') el.innerHTML = dashboard();
  if(v==='tasks') el.innerHTML = tasksUI();
  if(v==='timer') el.innerHTML = timerUI();
  if(v==='goals') el.innerHTML = goalsUI();
  if(v==='notes') el.innerHTML = notesUI();
  if(v==='exams') el.innerHTML = examsUI();
  if(v==='analytics') el.innerHTML = analyticsUI();
  setTimeout(()=>loadData(v), 10);
}

function dashboard(){
  const today = new Date().toISOString().slice(0,10);
  const todaysTasks = data.tasks.filter(t=>t.date===today);
  return `<div class="card"><h3>Today's Tasks</h3>${todaysTasks.map(t=>taskRow(t)).join('')||'No tasks for today'}</div>
  <div class="grid-3">
    <div class="card"><b>Study Hours Today</b><h2>${totalHours(today)}h</h2></div>
    <div class="card"><b>Tasks Done</b><h2>${data.tasks.filter(t=>t.done).length}/${data.tasks.length}</h2></div>
    <div class="card"><b>Level ${data.level}</b><progress value="${data.xp%100}" max="100"></progress></div>
  </div>`
}

function tasksUI(){
  return `<div class="card"><h3>Add Task</h3>
  <input id="tname" placeholder="Task name">
  <input id="tsub" placeholder="Enter subject name" list="subjects">
  <datalist id="subjects"></datalist>
  <select id="tpri"><option>High</option><option>Medium</option><option>Low</option></select>
  <input id="tdate" type="date">
  <button onclick="addTask()">Add</button>
  <h3>All Tasks</h3><div id="tasklist"></div></div>`
}

function taskRow(t){
  return `<div class="task">
    <span><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})"> ${t.name} 
    <span class="badge ${t.priority.toLowerCase()}">${t.priority}</span> - ${t.subject} - ${t.date}</span>
    <button onclick="delTask(${t.id})">🗑</button>
  </div>`
}

function addTask(){
  const name = document.getElementById('tname').value;
  const subject = document.getElementById('tsub').value;
  if(!name) return alert('Enter task name');
  if(!subject) return alert('Enter subject name');
  
  data.tasks.push({id:Date.now(),name,subject,priority:tpri.value,date:tdate.value,done:false});
  save(); 
  updateSubjectList();
  show('tasks'); 
  addXP(10);
}

function updateSubjectList(){
  const subjects = [...new Set(data.tasks.map(t=>t.subject).filter(Boolean))];
  document.getElementById('subjects').innerHTML = subjects.map(s=>`<option value="${s}">`).join('');
}

function toggleTask(id){
  let t = data.tasks.find(x=>x.id===id); t.done=!t.done; 
  if(t.done) addXP(20);
  save(); show('tasks');
}
function delTask(id){data.tasks=data.tasks.filter(x=>x.id!==id); save(); show('tasks')}

function timerUI(){
  return `<div class="card"><h3>Pomodoro: 25 min study + 5 min break</h3>
  <div class="timer" id="timerDisplay">25:00</div>
  <button onclick="startPom()">Start</button><button onclick="pausePom()">Pause</button><button onclick="resetPom()">Reset</button></div>
  <div class="card"><h3>Log Study Session</h3>
  <input id="shours" type="number" step="0.5" placeholder="Hours studied">
  <button onclick="logHours()">Log</button></div>`
}

let sec=25*60, isBreak=false, pomInterval=null;
function updateTimer(){
  const el = document.getElementById('timerDisplay');
  if(el) el.textContent=`${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}
function startPom(){
  clearInterval(pomInterval);
  pomInterval=setInterval(()=>{
    sec--; updateTimer();
    if(sec<=0){
      clearInterval(pomInterval); 
      alert(isBreak ? 'Study time!' : 'Break time! 5 minutes'); 
      isBreak=!isBreak; sec=isBreak?5*60:25*60; updateTimer();
    }
  },1000)
}
function pausePom(){clearInterval(pomInterval)}
function resetPom(){clearInterval(pomInterval); sec=25*60; isBreak=false; updateTimer()}

function logHours(){
  const h = parseFloat(document.getElementById('shours').value);
  if(!h) return alert('Enter hours');
  data.sessions.push({date:new Date().toISOString().slice(0,10), hours: h});
  addXP(30); save(); alert('Logged '+h+' hours!'); document.getElementById('shours').value='';
}

function goalsUI(){
  const today = new Date().toISOString().slice(0,10);
  const done = parseFloat(totalHours(today));
  const pct = Math.min(100, done/data.goals.daily*100);
  return `<div class="card"><h3>Daily Goal: ${data.goals.daily} hours</h3>
  <progress value="${pct}" max="100"></progress><p>${done}h / ${data.goals.daily}h = ${pct.toFixed(0)}%</p>
  <input id="newgoal" type="number" value="${data.goals.daily}"><button onclick="setGoal()">Set Goal</button></div>`
}
function setGoal(){data.goals.daily=parseFloat(document.getElementById('newgoal').value); save(); show('goals')}

function notesUI(){
  return `<div class="card"><h3>Notes</h3>
  <input id="ntitle" placeholder="Note title">
  <div id="nbody" class="note" contenteditable="true"></div>
  <button onclick="addNote()">Save Note</button>
  <h3>Saved Notes</h3><div id="notelist"></div></div>`
}
function addNote(){
  data.notes.push({id:Date.now(),title:document.getElementById('ntitle').value,body:document.getElementById('nbody').innerHTML}); 
  save(); show('notes')
}

function examsUI(){
  return `<div class="card"><h3>Add Exam</h3>
  <input id="ename" placeholder="Exam name"><input id="edate" type="date"><button onclick="addExam()">Add</button>
  <h3>Upcoming Exams</h3><div id="examlist"></div></div>`
}
function addExam(){data.exams.push({id:Date.now(),name:ename.value,date:edate.value}); save(); show('exams')}

function analyticsUI(){
  return `<div class="card"><h3>Analytics</h3>
  <p>Total Study Hours: ${totalHours()}</p>
  <p>Completed Tasks: ${data.tasks.filter(t=>t.done).length}</p>
  <p>Pending Tasks: ${data.tasks.filter(t=>!t.done).length}</p>
  <p>Total Sessions: ${data.sessions.length}</p>
  </div>`
}

function loadData(v){
  if(v==='tasks'){
    const el = document.getElementById('tasklist');
    if(el) el.innerHTML = data.tasks.map(t=>taskRow(t)).join('');
    updateSubjectList(); // load previous subjects as suggestions
  }
  if(v==='notes'){
    const el = document.getElementById('notelist');
    if(el) el.innerHTML = data.notes.map(n=>`<div class="card"><b>${n.title}</b><div>${n.body}</div></div>`).join('');
  }
  if(v==='exams'){
    const el = document.getElementById('examlist');
    if(el) el.innerHTML = data.exams.map(e=>`<div class="task">${e.name} - ${daysLeft(e.date)} days left</div>`).join('');
  }
}

function totalHours(date){
  return data.sessions.filter(s=>!date||s.date===date).reduce((a,b)=>a+b.hours,0).toFixed(1)
}
function daysLeft(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function addXP(x){data.xp+=x; if(data.xp>=data.level*100){data.level++; alert('Level Up! You are now Level '+data.level)}}
function toggleTheme(){document.body.classList.toggle('light')}
function exportData(){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='studyplanner-backup.json'; a.click();
}
function clearData(){if(confirm('Delete all data?')){localStorage.removeItem('studyPlanner'); location.reload()}}

show('dashboard');
</script>
</body>
</html>
